<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Produk | CyberCrate</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js"></script>
</head>

<body>
  <nav>
    <div class="logo"><img src="images/logo.png">
      <h2>CYBER CREATE</h2>
    </div>
    <div class="menu"><a href="index.html">Home</a><a href="index.html#produk">Produk</a></div>
    <div class="nav-right">
      <div class="cart-icon" onclick="toggleCart()" style="cursor:pointer;">
        <img src="images/cart.png"><span id="cart-count">0</span>
      </div>
    </div>
  </nav>

  <h2 id="judul" style="text-align:center; margin-top:20px; color:#0ff; font-family:'Orbitron', sans-serif;"></h2>
  <div class="grid" id="list"></div>

  <div class="cart-sidebar" id="cartSidebar">
    <span class="cart-close" onclick="toggleCart()">✕</span>
    <h2>Keranjang</h2>
    <hr class="cyber-hr">
    <div id="cartList"></div>
    <h3 id="cartTotal">Total: Rp 0</h3>
    <button class="btn-bayar-cyber" style="width: 100%;" onclick="openCheckout()">Checkout</button>
  </div>

  <div id="checkoutModal" class="modal">
    <div class="modal-content-cyber">
      <span class="close-cyber" onclick="closeCheckout()">&times;</span>
      <h2 class="modal-title-cyber">Detail Pengiriman</h2>
      <!-- Rincian Hitungan Barang[cite: 3] -->
      <div id="checkout-items" class="checkout-list"
        style="margin-bottom: 20px; border: 1px solid #333; padding: 10px; border-radius: 5px; max-height: 150px; overflow-y: auto;">
      </div>
      <div class="total-section" style="margin-bottom: 20px; text-align: right;">
        <h3>Total Bayar: Rp <span id="checkout-total">0</span></h3>
      </div>

      <div class="form-shipping">
        <input type="text" id="buyer-name" placeholder="Nama Lengkap" class="cyber-input">
        <textarea id="buyer-address" placeholder="Alamat Lengkap Penerima" class="cyber-input"></textarea>
        <select id="payment-method" class="cyber-input">
          <option value="" disabled selected>Pilih Metode Pembayaran</option>
          <option value="transfer">Transfer Bank</option>
          <option value="e-wallet">E-Wallet (Dana/OVO)</option>
          <option value="cod">Cash on Delivery</option>
        </select>
      </div>
      <button class="btn-bayar-cyber" onclick="bayarSekarang()">Bayar Sekarang</button>
    </div>
  </div>

  <script>
    // Ambil data terbaru dari localStorage
    let products = JSON.parse(localStorage.getItem("products")) || [];
    const category = localStorage.getItem("category");
    document.getElementById("judul").innerText = category ? category.toUpperCase() : "PRODUK";

    function renderProducts() {
        const list = document.getElementById("list");
        // Filter produk berdasarkan kategori yang dipilih (PC/Motherboard/dll)
        const filtered = products.filter(p => p.category === category);
        list.innerHTML = "";
        
        filtered.forEach(p => {
            let detailBtn = (p.category === "pc" || p.category === "motherboard") ? `<button class="btn-detail" onclick="detail(${p.id})">DETAIL</button>` : "";
            const isOutOfStock = p.stock <= 0;
            const stokInfo = isOutOfStock ? `<small style="color: #ff4d4d; font-weight:bold;">STOK HABIS</small>` : `<small style="color: #0ff;">Tersedia: ${p.stock}</small>`;
            
            list.innerHTML += `
                <div class="box">
                    <img src="images/${p.img}" onerror="this.src='images/default.png'">
                    <p class="product-name">${p.name}</p>
                    <small class="product-price">Rp ${p.price.toLocaleString()}</small><br>${stokInfo}
                    <div class="action-buttons" style="margin-top:10px;">
                        ${detailBtn}
                        <button class="btn-buy" onclick="beli(${p.id})" ${isOutOfStock ? 'disabled style="opacity:0.5"' : ''}>
                            ${isOutOfStock ? 'OUT OF STOCK' : 'TAMBAH KE KERANJANG'}
                        </button>
                    </div>
                </div>`;
        });
    }

    function renderCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let db = JSON.parse(localStorage.getItem("products")) || [];

    let list = document.getElementById("cartList");
    let totalEl = document.getElementById("cartTotal");

    list.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        let p = db.find(x => x.id == item.id);

        if (p) {
            let sub = p.price * item.qty;
            total += sub;

            list.innerHTML += `
<div class="cart-item">

  <p>${p.name}</p>

  <p>Rp ${sub.toLocaleString()}</p>

  <button onclick="updateQty(${index}, -1)">-</button>

  <span>${item.qty}</span>

  <button onclick="updateQty(${index}, 1)">+</button>

  <button onclick="removeItem(${index})">🗑</button>

</div>
`;
        }
    });

    totalEl.innerText =
        "Total: Rp " + total.toLocaleString();
}

    // Fungsi Logika Tambahan
    function beli(id) {
        let db = JSON.parse(localStorage.getItem("products")) || [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let pIdx = db.findIndex(item => item.id == id);
        if (pIdx !== -1 && db[pIdx].stock > 0) {
            db[pIdx].stock -= 1;
            let exist = cart.find(i => i.id == id);
            if (exist) { exist.qty++; } else { cart.push({ id: id, qty: 1 }); }
            localStorage.setItem("products", JSON.stringify(db));
            localStorage.setItem("cart", JSON.stringify(cart));
            products = db; // Update variabel lokal agar UI berubah[cite: 4]
            updateCartCount(); renderProducts(); renderCart();
        }
    }

    function updateQty(index, change) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let db = JSON.parse(localStorage.getItem("products")) || [];
        let item = cart[index];
        let pIdx = db.findIndex(p => p.id == item.id);
        if (pIdx !== -1) {
            if (change === 1 && db[pIdx].stock > 0) { db[pIdx].stock -= 1; item.qty += 1; }
            else if (change === -1 && item.qty > 1) { db[pIdx].stock += 1; item.qty -= 1; }
            else if (change === -1 && item.qty === 1) { return removeItem(index); }
        }
        localStorage.setItem("products", JSON.stringify(db));
        localStorage.setItem("cart", JSON.stringify(cart));
        products = db; renderCart(); updateCartCount(); renderProducts();
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let db = JSON.parse(localStorage.getItem("products")) || [];
        let item = cart[index];
        let pIdx = db.findIndex(p => p.id == item.id);
        if (pIdx !== -1) { db[pIdx].stock += item.qty; }
        cart.splice(index, 1);
        localStorage.setItem("products", JSON.stringify(db));
        localStorage.setItem("cart", JSON.stringify(cart));
        products = db; renderCart(); updateCartCount(); renderProducts();
    }

    function detail(id) { window.location.href = `product-detail.html?id=${id}`; }
    function toggleCart() { document.getElementById("cartSidebar").classList.toggle("active"); if (document.getElementById("cartSidebar").classList.contains("active")) renderCart(); }
    function updateCartCount() { let cart = JSON.parse(localStorage.getItem("cart")) || []; document.getElementById("cart-count").innerText = cart.reduce((t, i) => t + i.qty, 0); }
    
    // Inisialisasi awal
    renderProducts(); 
    updateCartCount();
</script>
</body>

</html>
